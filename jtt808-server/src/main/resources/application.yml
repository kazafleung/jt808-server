spring:
  application:
    name: jt808
  data:
    mongodb:
      uri: mongodb+srv://taxieco_dev:cDWggNaNhAi0jB6e@taxieco.nfp6huo.mongodb.net/zendo
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  mvc:
    format:
      date-time: yyyy-MM-dd HH:mm:ss
      date: yyyy-MM-dd
      time: HH:mm:ss

mybatis-plus:
  configuration:
    use-generated-keys: true
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  mapper-locations:
    - classpath:/mapper/*.xml

server:
  port: 8100

# HTTP base URL of this instance — used by the app server to route JT808 REST calls
# to the instance holding the device's TCP connection.
# Override per deployment, e.g. with the pod/VM IP:
#   instance.url: http://10.0.1.3:${server.port}
instance:
  url: http://152.69.210.81:${server.port}

oci:
  auth-type: INSTANCE_PRINCIPAL # Options: CONFIG_FILE, INSTANCE_PRINCIPAL
  config:
    file-path: ~/.oci/config
    profile: DEFAULT
  bucket: zendo-dev
  namespace: ax0s9dy3myes
  region: ap-singapore-1

diagnostics:
  # Minutes of silence (ACC on, speed > 0) before a device is flagged as abnormally offline
  offline-minutes: 5
  # Rolling window for GPS / signal quality counters (hours)
  window-hours: 24
  # GNSS satellite count below this → location record is "bad" for GPS quality check
  satellite-threshold: 6
  # Wireless signal strength below this → record is "bad" for signal quality check
  signal-threshold: 15

jt-server:
  jt808:
    tcp-port: 7100
    udp-port: 7100
    idle-timeout: 180
    message-package: org.zendo.protocol
    t0801:
      path: ./jt_data/media_file
    t9101:
      ip: 152.69.210.81
      tcp-port: 1078
      udp-port: 1078
    t9208:
      host: 152.69.210.81
      port: 10780
      enabled: true
      path: ./jt_data/alarm_file
    t9206:
      host: 152.69.210.81
      port: 2121
      username: ftpuser
      password: ftppass